{% extends "base.html" %}
{% block title %}پیشرفت کار — RubeTunes{% endblock %}
{% block head %}
<style>
  .job-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .job-header h1 { margin: 0; }
  .progress-section { margin: 1rem 0; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.83rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  #download-list { margin-top: 1.25rem; }
  .download-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.85rem 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 0.6rem;
    background: var(--bg);
    transition: border-color var(--transition);
  }
  .download-card:hover { border-color: var(--accent); }
  .download-card .filename { font-weight: 600; margin-bottom: 0.15rem; font-size: 0.92rem; }
  .download-card .meta { font-size: 0.78rem; color: var(--muted); direction: ltr; text-align: left; }
  .download-card .dl-actions { display: flex; gap: 0.5rem; }
  #error-box { margin-top: 1rem; }
  @media (max-width: 480px) {
    .download-card { flex-direction: column; align-items: flex-start; }
    .download-card .dl-actions { flex-wrap: wrap; }
    .download-card .dl-actions button { flex: 1; min-width: 5rem; }
  }
</style>
{% endblock %}
{% block content %}
<div style="margin-bottom:1rem">
  <a href="/library" style="display:inline-flex; align-items:center; gap:0.3rem; color:var(--muted); font-size:0.88rem;">
    ← بازگشت به کتابخانه
  </a>
</div>
<div class="card">
  <div class="job-header">
    <h1>وضعیت کار</h1>
    <span id="status-badge" class="badge badge-pending">در انتظار</span>
    <span id="phase-badge" class="badge badge-running" style="display:none"></span>
  </div>
  <p style="font-size:0.83rem; color:var(--muted); margin-bottom:1rem">
    شناسه: <span class="num" style="font-family:monospace; background:var(--surface-raised); padding:0.1rem 0.4rem; border-radius:0.25rem; font-size:0.8rem;">{{ job_id }}</span>
  </p>
  <div class="progress-section">
    <progress id="progress-bar" value="0" max="100"></progress>
    <div class="progress-meta">
      <span id="track-text"></span>
      <span id="progress-text" class="num"></span>
    </div>
  </div>
  <div id="error-box"></div>
  <div id="download-list"></div>
  <div style="margin-top:1.25rem">
    <button id="cancel-btn" class="btn btn-danger" style="display:none">🚫 لغو کار</button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function() {
  var JOB_ID = {{ job_id | tojson }};
  var token = window.getToken();
  if (!token) { window.location.href = '/login'; return; }

  var statusBadge = document.getElementById('status-badge');
  var phaseBadge = document.getElementById('phase-badge');
  var progressBar = document.getElementById('progress-bar');
  var progressText = document.getElementById('progress-text');
  var trackText = document.getElementById('track-text');
  var errorBox = document.getElementById('error-box');
  var downloadList = document.getElementById('download-list');
  var cancelBtn = document.getElementById('cancel-btn');

  var _isTerminal = false;
  var _sseActive = false;
  var _pollTimer = null;
  var _downloadParts = [];
  var POLL_INTERVAL_MS = 5000;

  var statusLabels = {
    'pending': 'در انتظار', 'accepted': 'پذیرفته شد',
    'running': 'در حال اجرا', 'completed': 'تکمیل شد',
    'failed': 'خطا', 'cancelled': 'لغو شد', 'deleted': 'فایل‌ها حذف شد'
  };
  var phaseLabels = {
    'downloading': 'دانلود', 'processing': 'پردازش',
    'uploading': 'آپلود', 'zipping': 'فشرده‌سازی'
  };
  var badgeClass = {
    'pending': 'badge-pending', 'accepted': 'badge-pending',
    'running': 'badge-running', 'completed': 'badge-completed',
    'failed': 'badge-failed', 'cancelled': 'badge-cancelled',
    'deleted': 'badge-cancelled'
  };
  var errorMessages = {
    'no_source_available': 'منبع دانلودی یافت نشد.',
    's2_upload_failed': 'خطا در آپلود. لطفاً دوباره امتحان کنید.',
    'download_timeout': 'دانلود به پایان وقت رسید.',
    'rate_limited': 'محدودیت نرخ از طرف منبع.',
    'invalid_url': 'لینک نامعتبر است.',
    'access_denied': 'دسترسی رد شد.',
    'disk_space_error': 'فضای دیسک ناکافی.',
    'blocked': 'حساب شما مسدود شده است.',
    'not_whitelisted': 'حساب شما در لیست سفید نیست.',
    'unsupported_platform': 'پلتفرم پشتیبانی نمی‌شود.',
    'duplicate_job': 'این کار قبلاً در حال انجام است.',
    'cancelled': 'کار لغو شد.',
    'internal_error': 'خطای داخلی. لطفاً دوباره امتحان کنید.'
  };

  function formatBytes(bytes) {
    if (!bytes) return '';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderDownloads(parts) {
    if (!parts || parts.length === 0) return;
    _downloadParts = parts.slice();
    var html = '<h2>دانلود فایل‌ها</h2>';
    if (parts.length > 1) {
      html += '<p style="font-size:0.85rem;color:var(--muted);margin-bottom:0.75rem">برای فایل‌های چند بخشی از 7-Zip برای استخراج استفاده کنید.</p>';
    }
    parts.forEach(function(part, i) {
      var filename = part.key ? part.key.split('/').pop() : ('بخش ' + (i + 1));
      var size = formatBytes(part.size);
      var mime = part.mime_type || '';
      html += '<div class="download-card">';
      html += '<div><div class="filename">' + escapeHtml(filename) + '</div>';
      html += '<div class="meta">' + escapeHtml(size + (mime ? ' · ' + mime : '')) + '</div></div>';
      html += '<div class="dl-actions">';
      html += '<button class="btn btn-primary js-download-btn" data-mode="download" data-part="' + i + '">⬇ دانلود</button>';
      html += '<button class="btn btn-secondary js-download-btn" data-mode="stream" data-part="' + i + '">▶ پخش</button>';
      html += '</div>';
      html += '</div>';
    });
    downloadList.innerHTML = html;
  }

  downloadList.addEventListener('click', function(e) {
    var btn = e.target.closest('button.js-download-btn');
    if (!btn) return;
    var part = parseInt(btn.getAttribute('data-part') || '', 10);
    if (!Number.isInteger(part) || part < 0 || part >= _downloadParts.length) {
      console.warn('Invalid download part index:', part);
      return;
    }
    var mode = btn.getAttribute('data-mode') || 'download';
    var partInfo = _downloadParts[part] || {};
    var rawKey = typeof partInfo.key === 'string' ? partInfo.key.trim() : '';
    var filename = rawKey ? (rawKey.split('/').pop() || ('part-' + part)) : ('part-' + part);
    doDownload(JOB_ID, part, mode, filename);
  });

  function applyUpdate(data) {
    var type = data.type || data.status;
    var st = data.status || (type === 'job.completed' ? 'completed' : type === 'job.failed' ? 'failed' : null);
    if (data.type === 'job.accepted') st = 'accepted';
    if (data.type === 'job.progress') st = 'running';
    if (data.type === 'job.completed') st = 'completed';
    if (data.type === 'job.failed') st = 'failed';
    if (data.type === 'job.deleted') st = 'deleted';

    if (st) {
      statusBadge.className = 'badge ' + (badgeClass[st] || '');
      statusBadge.textContent = statusLabels[st] || st;
      if (st === 'completed' || st === 'failed' || st === 'cancelled' || st === 'deleted') {
        cancelBtn.style.display = 'none';
      } else {
        cancelBtn.style.display = '';
      }
    }

    if (data.phase) {
      phaseBadge.style.display = '';
      phaseBadge.textContent = phaseLabels[data.phase] || data.phase;
    }

    if (data.percent != null) {
      progressBar.value = data.percent;
      progressText.textContent = data.percent + '%' + (data.speed ? '  ·  ' + data.speed : '');
    }
    if (data.done_tracks != null && data.total_tracks != null) {
      progressBar.value = Math.round(100 * data.done_tracks / data.total_tracks);
      trackText.textContent = data.done_tracks + ' / ' + data.total_tracks + ' آهنگ';
      if (data.current_track) trackText.textContent += '  —  ' + data.current_track;
    }

    if (data.type === 'job.completed' && data.parts) {
      renderDownloads(data.parts);
    }
    if (data.type === 'job.failed') {
      var code = data.error_code || 'internal_error';
      var msg = errorMessages[code] || data.message || 'خطای ناشناخته';
      errorBox.innerHTML = '<div class="alert alert-error">' + msg + '</div>';
    }
    if (data.type === 'job.deleted' || data.status === 'deleted') {
      downloadList.innerHTML = '';
      errorBox.innerHTML = '<div class="alert alert-info">⏳ فایل‌های این کار پس از ۱ ساعت به‌صورت خودکار حذف شده‌اند.</div>';
    }
  }

  // Load current job state first
  window.authFetch('/jobs/' + JOB_ID)
    .then(function(r) {
      if (r.status === 403 || r.status === 404) { window.location.href = '/library'; return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;
      applyUpdate(data);
      if (data.status === 'completed') {
        _isTerminal = true;
        // Fetch download parts
        window.authFetch('/jobs/' + JOB_ID + '/download')
          .then(function(r) { return r.json(); })
          .then(function(d) { if (d.parts) renderDownloads(d.parts); });
        return; // No SSE needed
      }
      if (data.status === 'failed' || data.status === 'cancelled' || data.status === 'deleted') {
        _isTerminal = true;
        return;
      }
      startSSE();
    });

  function startSSE() {
    _sseActive = true;
    var url = '/jobs/' + JOB_ID + '/events';
    var es = new EventSource(url);
    es.onmessage = function(e) {
      try {
        var data = JSON.parse(e.data);
        applyUpdate(data);
        if (data.type === 'job.completed') {
          _isTerminal = true;
          _sseActive = false;
          es.close();
          // Fetch download list
          window.authFetch('/jobs/' + JOB_ID + '/download')
            .then(function(r) { return r.json(); })
            .then(function(d) { if (d.parts) renderDownloads(d.parts); });
        }
        if (data.type === 'job.failed' || data.type === 'job.cancelled' || data.type === 'job.deleted') {
          _isTerminal = true;
          _sseActive = false;
          es.close();
        }
      } catch (_) {}
    };
    es.onerror = function() {
      _sseActive = false;
      es.close();
      // Fall back to polling when SSE is unavailable
      if (!_isTerminal) scheduleNextPoll();
    };
  }

  function clearPollTimer() {
    if (_pollTimer !== null) { clearTimeout(_pollTimer); _pollTimer = null; }
  }

  // ── Polling fallback (used when SSE fails) ───────────────────────
  function scheduleNextPoll() {
    if (_isTerminal || _sseActive) return;
    _pollTimer = setTimeout(doPoll, POLL_INTERVAL_MS);
  }

  async function doPoll() {
    _pollTimer = null;
    if (_isTerminal || _sseActive) return;
    try {
      var r = await window.authFetch('/jobs/' + JOB_ID);
      if (r.status === 403 || r.status === 404) {
        _isTerminal = true;
        window.location.href = '/library';
        return;
      }
      var data = await r.json();
      // Clear any transient error notice on success
      var notice = document.getElementById('refresh-notice');
      if (notice) notice.remove();
      applyUpdate(data);
      if (data.status === 'completed') {
        _isTerminal = true;
        window.authFetch('/jobs/' + JOB_ID + '/download')
          .then(function(r2) { return r2.json(); })
          .then(function(d) { if (d.parts) renderDownloads(d.parts); });
        return;
      }
      if (data.status === 'failed' || data.status === 'cancelled' || data.status === 'deleted') {
        _isTerminal = true;
        return;
      }
    } catch (_ex) {
      if (!document.getElementById('refresh-notice')) {
        var div = document.createElement('div');
        div.id = 'refresh-notice';
        div.className = 'alert alert-info';
        div.style.marginTop = '0.5rem';
        div.textContent = 'خطا در بروزرسانی وضعیت، دوباره تلاش می‌شود…';
        errorBox.appendChild(div);
      }
    }
    scheduleNextPoll();
  }

  // Pause polling while tab is hidden; resume when visible again
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      clearPollTimer();
    } else {
      if (!_isTerminal && !_sseActive && _pollTimer === null) scheduleNextPoll();
    }
  });

  async function doDownload(jobId, part, mode, filename) {
    var r = await window.authFetch('/jobs/' + jobId + '/download?part=' + part + '&url=1');
    if (!r) return;
    if (r.ok) {
      try {
        var data = await r.json();
        if (data.url) {
          if (mode === 'download') {
            var a = document.createElement('a');
            a.href = data.url;
            a.download = filename || '';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          } else {
            window.open(data.url, '_blank');
          }
        }
      } catch (_) {}
    }
  }
  window.doDownload = doDownload;

  cancelBtn.addEventListener('click', async function() {
    cancelBtn.disabled = true;
    var resp = await window.authFetch('/jobs/' + JOB_ID, { method: 'DELETE' });
    if (resp.ok || resp.status === 204) {
      statusBadge.className = 'badge badge-cancelled';
      statusBadge.textContent = 'لغو شد';
      cancelBtn.style.display = 'none';
    } else {
      cancelBtn.disabled = false;
    }
  });
})();
</script>
{% endblock %}
