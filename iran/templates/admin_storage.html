{% extends "base.html" %}
{% block title %}ذخیره‌سازی — RubeTunes{% endblock %}
{% block content %}
<h1>مدیریت ذخیره‌سازی</h1>
<div class="card" id="summary-card">
  <div style="display:flex;gap:2rem;flex-wrap:wrap">
    <div><div style="color:var(--muted);font-size:0.85rem">تعداد آبجکت‌ها</div><div style="font-size:1.5rem;font-weight:700" id="total-objects">—</div></div>
    <div><div style="color:var(--muted);font-size:0.85rem">حجم کل</div><div style="font-size:1.5rem;font-weight:700" id="total-bytes">—</div></div>
  </div>
</div>
<div class="card">
  <h2>آبجکت‌ها</h2>
  <table>
    <thead><tr><th>کلید</th><th>حجم (بایت)</th><th>آخرین تغییر</th></tr></thead>
    <tbody id="objects-tbody">
      <tr><td colspan="3" style="color:var(--muted)">در حال بارگذاری…</td></tr>
    </tbody>
  </table>
</div>
<div id="action-result" style="display:none" class="alert"></div>
{% endblock %}
{% block scripts %}
<script>
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function showError(msg) {
  const el = document.getElementById('action-result');
  el.style.display = '';
  el.className = 'alert alert-error';
  el.textContent = msg;
  const tbody = document.getElementById('objects-tbody');
  tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted)">—</td></tr>';
}

async function load() {
  const r = await window.authFetch('/admin/storage');
  if (!r) return;
  if (r.status === 403) { window.location = '/login'; return; }
  if (!r.ok) {
    let detail = '';
    try {
      const err = await r.json();
      if (err && err.detail) detail = ': ' + err.detail;
    } catch (_) {}
    showError('خطا در دریافت اطلاعات ذخیره‌سازی' + detail);
    return;
  }
  let data;
  try {
    data = await r.json();
  } catch (_) {
    showError('خطا در پردازش پاسخ سرور');
    return;
  }
  document.getElementById('total-objects').textContent = data.total_objects ?? 0;
  document.getElementById('total-bytes').textContent = formatBytes(data.total_bytes ?? 0);
  const tbody = document.getElementById('objects-tbody');
  tbody.innerHTML = '';
  const objects = data.objects ?? [];
  if (!objects.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted)">0 آبجکت</td></tr>';
    return;
  }
  objects.forEach(o => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="num">${o.key}</td><td class="num">${formatBytes(o.size)}</td><td class="num">${o.last_modified?.slice(0,16).replace('T',' ') ?? ''}</td>`;
    tbody.appendChild(tr);
  });
}

load();
</script>
{% endblock %}
