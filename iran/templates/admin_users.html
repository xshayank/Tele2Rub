{% extends "base.html" %}
{% block title %}مدیریت کاربران — RubeTunes{% endblock %}
{% block content %}
<h1>مدیریت کاربران</h1>

<div class="card">
  <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">
    <select id="filter-status" onchange="loadUsers()">
      <option value="">همه وضعیت‌ها</option>
      <option value="pending_approval">در انتظار تأیید</option>
      <option value="active">فعال</option>
      <option value="blocked">مسدود</option>
      <option value="deleted">حذف‌شده</option>
    </select>
    <select id="filter-role" onchange="loadUsers()">
      <option value="">همه نقش‌ها</option>
      <option value="user">کاربر</option>
      <option value="admin">مدیر</option>
    </select>
  </div>
  <table>
    <thead>
      <tr>
        <th>نام</th>
        <th>ایمیل</th>
        <th>نقش</th>
        <th>وضعیت</th>
        <th>تاریخ ثبت</th>
        <th>عملیات</th>
      </tr>
    </thead>
    <tbody id="users-tbody">
      <tr><td colspan="6" style="color:var(--muted)">در حال بارگذاری…</td></tr>
    </tbody>
  </table>
  <div id="pagination" class="pagination"></div>
</div>

<div id="action-result" style="display:none" class="alert"></div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1;

async function apiReq(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await window.authFetch(path, opts);
  if (!r) return null;
  if (r.status === 403) { window.location = '/login'; return null; }
  return r.ok ? r.json() : null;
}

async function loadUsers() {
  const status = document.getElementById('filter-status').value;
  const role = document.getElementById('filter-role').value;
  let url = `/admin/users?page=${currentPage}&per_page=25`;
  if (status) url += `&status=${status}`;
  if (role) url += `&role=${role}`;
  const data = await apiReq('GET', url);
  if (!data) return;
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '';
  data.users.forEach(u => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${u.display_name}</td>
      <td>${u.email}</td>
      <td>${u.role}</td>
      <td><span class="badge badge-${u.status === 'active' ? 'completed' : u.status === 'blocked' ? 'failed' : 'pending'}">${u.status}</span></td>
      <td class="num">${u.created_at?.slice(0,10) ?? ''}</td>
      <td style="display:flex;gap:0.4rem;flex-wrap:wrap">
        ${u.status === 'pending_approval' ? `<button class="btn btn-primary" onclick="patchUser('${u.id}','approve')">تأیید</button>` : ''}
        ${u.status === 'active' ? `<button class="btn btn-danger" onclick="patchUser('${u.id}','block')">مسدود</button>` : ''}
        ${u.status === 'blocked' ? `<button class="btn btn-secondary" onclick="patchUser('${u.id}','unblock')">رفع مسدودی</button>` : ''}
        ${u.status !== 'deleted' ? `<button class="btn btn-danger" onclick="patchUser('${u.id}','delete')">حذف</button>` : ''}
      </td>`;
    tbody.appendChild(tr);
  });
  const total = data.total, pp = 25;
  const pages = Math.ceil(total / pp);
  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  for (let i = 1; i <= pages; i++) {
    const a = document.createElement('a');
    a.href = '#'; a.textContent = i;
    if (i === currentPage) a.className = 'current';
    a.onclick = e => { e.preventDefault(); currentPage = i; loadUsers(); };
    pg.appendChild(a);
  }
}

async function patchUser(id, action) {
  const res = await apiReq('PATCH', `/admin/users/${id}`, { action });
  const el = document.getElementById('action-result');
  el.style.display = '';
  if (res) { el.className = 'alert alert-success'; el.textContent = `عملیات ${action} موفق بود.`; loadUsers(); }
  else { el.className = 'alert alert-error'; el.textContent = 'خطا در انجام عملیات.'; }
}

loadUsers();
</script>
{% endblock %}
