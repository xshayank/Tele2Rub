{% extends "base.html" %}
{% block title %}مدیریت کاربران — RubeTunes{% endblock %}
{% block content %}
<h1>مدیریت کاربران</h1>

<div class="card">
  <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">
    <select id="filter-status">
      <option value="">همه وضعیت‌ها</option>
      <option value="pending_approval">در انتظار تأیید</option>
      <option value="active">فعال</option>
      <option value="blocked">مسدود</option>
      <option value="deleted">حذف‌شده</option>
    </select>
    <select id="filter-role">
      <option value="">همه نقش‌ها</option>
      <option value="user">کاربر</option>
      <option value="admin">مدیر</option>
    </select>
  </div>
  <table>
    <thead>
      <tr>
        <th>نام</th>
        <th>ایمیل</th>
        <th>نقش</th>
        <th>وضعیت</th>
        <th>سقف جاب</th>
        <th>انقضا</th>
        <th>جاب‌ها</th>
        <th>تاریخ ثبت</th>
        <th>عملیات</th>
      </tr>
    </thead>
    <tbody id="users-tbody">
      <tr><td colspan="9" style="color:var(--muted)">در حال بارگذاری…</td></tr>
    </tbody>
  </table>
  <div id="pagination" class="pagination"></div>
</div>

<div id="action-result" style="display:none" class="alert"></div>

<!-- Job-limit modal -->
<div id="jl-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center">
  <div class="card" style="min-width:320px;max-width:420px;margin:auto">
    <h3 style="margin-top:0">تنظیم سقف جاب</h3>
    <label>تعداد جاب مجاز
      <input id="jl-limit" type="number" min="1" value="100" style="width:100%;margin-top:.3rem">
    </label>
    <label style="margin-top:.8rem;display:block">مدت (روز)
      <input id="jl-days" type="number" min="1" value="30" style="width:100%;margin-top:.3rem">
    </label>
    <div style="display:flex;gap:.6rem;margin-top:1rem;justify-content:flex-end">
      <button class="btn btn-secondary" id="close-jl-modal-btn">انصراف</button>
      <button class="btn btn-primary" id="submit-jl-modal-btn">ذخیره</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1;
let modalUserId = null;

async function apiReq(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await window.authFetch(path, opts);
  if (!r) return null;
  if (r.status === 403) { window.location = '/login'; return null; }
  return r.ok ? r.json() : null;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return iso.slice(0, 10);
}

async function loadUsers() {
  const status = document.getElementById('filter-status').value;
  const role = document.getElementById('filter-role').value;
  let url = `/admin/users?page=${currentPage}&per_page=25`;
  if (status) url += `&status=${status}`;
  if (role) url += `&role=${role}`;
  const data = await apiReq('GET', url);
  if (!data) return;
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '';
  data.users.forEach(u => {
    const exp = u.job_limit_expires_at ? u.job_limit_expires_at.slice(0,10) : (u.job_limit != null ? '∞' : '—');
    const expired = u.job_limit_expires_at && new Date(u.job_limit_expires_at) < new Date();
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escHtml(u.display_name)}</td>
      <td>${escHtml(u.email)}</td>
      <td>${u.role}</td>
      <td><span class="badge badge-${u.status === 'active' ? 'completed' : u.status === 'blocked' ? 'failed' : 'pending'}">${u.status}</span></td>
      <td class="num">${u.job_limit != null ? u.job_limit + ' جاب' + (expired ? ' ⚠️' : '') : '—'}</td>
      <td class="num">${exp}</td>
      <td class="num">${u.jobs_count != null ? u.jobs_count : 0}</td>
      <td class="num">${fmtDate(u.created_at)}</td>
      <td style="display:flex;gap:0.4rem;flex-wrap:wrap">
        ${u.status === 'pending_approval' ? `<button class="btn btn-primary user-action" data-user-id="${escHtml(u.id)}" data-action="approve">تأیید</button>` : ''}
        ${u.status === 'active' ? `<button class="btn btn-danger user-action" data-user-id="${escHtml(u.id)}" data-action="block">مسدود</button>` : ''}
        ${u.status === 'blocked' ? `<button class="btn btn-secondary user-action" data-user-id="${escHtml(u.id)}" data-action="unblock">رفع مسدودی</button>` : ''}
        ${u.status !== 'deleted' ? `<button class="btn btn-danger user-action" data-user-id="${escHtml(u.id)}" data-action="delete">حذف</button>` : ''}
        <button class="btn btn-secondary user-job-limit" data-user-id="${escHtml(u.id)}">سقف جاب</button>
        ${u.job_limit != null ? `<button class="btn btn-secondary user-action" data-user-id="${escHtml(u.id)}" data-action="reset_job_limit">ریست</button>` : ''}
        ${u.job_limit != null ? `<button class="btn btn-danger user-action" data-user-id="${escHtml(u.id)}" data-action="clear_job_limit">حذف سقف</button>` : ''}
      </td>`;
    tbody.appendChild(tr);
  });
  const total = data.total, pp = 25;
  const pages = Math.ceil(total / pp);
  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  for (let i = 1; i <= pages; i++) {
    const a = document.createElement('a');
    a.href = '#'; a.textContent = i;
    if (i === currentPage) a.className = 'current';
    a.onclick = e => { e.preventDefault(); currentPage = i; loadUsers(); };
    pg.appendChild(a);
  }
}

async function patchUser(id, action, extra) {
  const res = await apiReq('PATCH', `/admin/users/${id}`, { action, ...extra });
  const el = document.getElementById('action-result');
  el.style.display = '';
  if (res) { el.className = 'alert alert-success'; el.textContent = `عملیات ${action} موفق بود.`; loadUsers(); }
  else { el.className = 'alert alert-error'; el.textContent = 'خطا در انجام عملیات.'; }
}

function openModal(userId) {
  modalUserId = userId;
  document.getElementById('jl-modal').style.display = 'flex';
}

function closeModal() {
  modalUserId = null;
  document.getElementById('jl-modal').style.display = 'none';
}

async function submitJobLimit() {
  if (!modalUserId) return;
  const limit = parseInt(document.getElementById('jl-limit').value, 10);
  const days = parseInt(document.getElementById('jl-days').value, 10);
  if (!limit || !days) return;
  const uid = modalUserId;
  closeModal();
  await patchUser(uid, 'set_job_limit', { job_limit: limit, days });
}

document.getElementById('users-tbody').addEventListener('click', function(e) {
  const actionBtn = e.target.closest('.user-action');
  if (actionBtn) {
    patchUser(actionBtn.dataset.userId, actionBtn.dataset.action);
    return;
  }
  const jobLimitBtn = e.target.closest('.user-job-limit');
  if (jobLimitBtn) openModal(jobLimitBtn.dataset.userId);
});
document.getElementById('filter-status').addEventListener('change', function() { currentPage = 1; loadUsers(); });
document.getElementById('filter-role').addEventListener('change', function() { currentPage = 1; loadUsers(); });
document.getElementById('close-jl-modal-btn').addEventListener('click', closeModal);
document.getElementById('submit-jl-modal-btn').addEventListener('click', submitJobLimit);

loadUsers();
</script>
{% endblock %}
