<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RubeTunes{% endblock %}</title>
  <link rel="stylesheet" href="/static/fonts/vazirmatn.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
    }
    body {
      font-family: 'Vazirmatn', 'Tahoma', 'Arial', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
      text-align: right;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.25rem;
    }
    .nav-brand { font-weight: 700; font-size: 1.25rem; color: var(--accent); }
    .nav-links { display: flex; gap: 1rem; list-style: none; align-items: center; }
    .nav-links a { color: var(--muted); font-size: 0.9rem; }
    .nav-links a:hover { color: var(--text); text-decoration: none; }
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 0.3rem;
    }
    .nav-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .nav-toggle span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text);
      border-radius: 1px;
    }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    h1, h2, h3 { margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; }
    h2 { font-size: 1.35rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; color: var(--muted); }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.8rem;
      border-radius: 0.4rem;
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      direction: ltr;
      text-align: left;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    button, .btn {
      cursor: pointer;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 0.4rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
    }
    button:focus-visible, .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .btn-primary { background: var(--accent); color: #0f172a; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); color: #0f172a; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: var(--muted); }
    .form-group { margin-bottom: 1rem; }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 0.4rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .alert-error { background: rgba(248,113,113,0.15); border: 1px solid var(--danger); color: var(--danger); }
    .alert-success { background: rgba(74,222,128,0.15); border: 1px solid var(--success); color: var(--success); }
    .alert-info { background: rgba(56,189,248,0.15); border: 1px solid var(--accent); color: var(--accent); }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-pending { background: rgba(251,191,36,0.2); color: var(--warning); }
    .badge-running { background: rgba(56,189,248,0.2); color: var(--accent); }
    .badge-completed { background: rgba(74,222,128,0.2); color: var(--success); }
    .badge-failed { background: rgba(248,113,113,0.2); color: var(--danger); }
    .badge-cancelled { background: rgba(148,163,184,0.2); color: var(--muted); }
    progress {
      width: 100%;
      height: 0.6rem;
      border-radius: 9999px;
      -webkit-appearance: none;
      appearance: none;
      margin: 0.5rem 0 1rem;
    }
    progress::-webkit-progress-bar { background: var(--border); border-radius: 9999px; }
    progress::-webkit-progress-value { background: var(--accent); border-radius: 9999px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: right; padding: 0.6rem 0.8rem; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .num { direction: ltr; text-align: left; }
    .platform-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
    .platform-chip {
      background: var(--border);
      border-radius: 0.4rem;
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .pagination a, .pagination span {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 0.3rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .pagination a:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .pagination .current { border-color: var(--accent); color: var(--accent); }
    /* ── Mobile responsive ───────────────────────────────────────── */
    @media (max-width: 640px) {
      nav { padding: 0.6rem 1rem; }
      .nav-toggle { display: flex; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        padding: 0.5rem 0;
        border-top: 1px solid var(--border);
        margin-top: 0.4rem;
      }
      .nav-links.open { display: flex; }
      .nav-links li { width: 100%; }
      .nav-links a {
        display: block;
        padding: 0.5rem 0.25rem;
        color: var(--text);
        font-size: 0.95rem;
      }
      main { margin: 1rem auto; padding: 0 0.75rem; }
      .card { padding: 1rem; }
      h1 { font-size: 1.4rem; }
      h2 { font-size: 1.15rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="nav-brand">🎵 RubeTunes</span>
    <button class="nav-toggle" id="nav-toggle" aria-label="منو" aria-expanded="false" aria-controls="nav-links">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">دانلود جدید</a></li>
      <li><a href="/search">🔍 جستجو</a></li>
      <li><a href="/library">کتابخانه</a></li>
      <li><a href="/settings">تنظیمات</a></li>
      <li id="nav-logout-item" style="display:none"><a href="#" id="nav-logout">خروج</a></li>
      <li id="nav-login-item"><a href="/login">ورود</a></li>
    </ul>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      // Migrate from sessionStorage to localStorage if needed
      var legacy = sessionStorage.getItem('rt_access_token');
      if (legacy) {
        localStorage.setItem('rt_access_token', legacy);
        sessionStorage.removeItem('rt_access_token');
      }

      function getToken() {
        return localStorage.getItem('rt_access_token') || sessionStorage.getItem('rt_access_token');
      }
      function setToken(t) {
        localStorage.setItem('rt_access_token', t);
        sessionStorage.removeItem('rt_access_token');
      }
      function clearToken() {
        localStorage.removeItem('rt_access_token');
        sessionStorage.removeItem('rt_access_token');
      }

      async function refreshToken() {
        var r = await fetch('/auth/refresh', { method: 'POST', credentials: 'include' });
        if (r.ok) {
          var data = await r.json();
          setToken(data.access_token);
          return data.access_token;
        }
        return null;
      }

      window.getToken = getToken;
      window.setToken = setToken;
      window.clearToken = clearToken;

      // authFetch: like fetch() but auto-refreshes on 401
      window.authFetch = async function(url, options) {
        options = options || {};
        options.headers = options.headers || {};
        var token = getToken();
        if (token) options.headers['Authorization'] = 'Bearer ' + token;
        var resp = await fetch(url, options);
        if (resp.status === 401) {
          var newToken = await refreshToken();
          if (newToken) {
            options.headers['Authorization'] = 'Bearer ' + newToken;
            resp = await fetch(url, options);
          } else {
            clearToken();
            window.location.href = '/login';
            return resp;
          }
        }
        return resp;
      };

      // Update nav state
      if (getToken()) {
        var logoutItem = document.getElementById('nav-logout-item');
        var loginItem = document.getElementById('nav-login-item');
        if (logoutItem) logoutItem.style.display = '';
        if (loginItem) loginItem.style.display = 'none';
      }
      var logoutBtn = document.getElementById('nav-logout');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function (e) {
          e.preventDefault();
          var t = getToken();
          if (t) fetch('/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + t }, credentials: 'include' });
          clearToken();
          window.location.href = '/login';
        });
      }

      // Mobile nav toggle
      var navToggle = document.getElementById('nav-toggle');
      var navLinks = document.getElementById('nav-links');
      if (navToggle && navLinks) {
        navToggle.addEventListener('click', function () {
          var open = navLinks.classList.toggle('open');
          navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
