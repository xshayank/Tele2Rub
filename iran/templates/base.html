<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RubeTunes{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
    }
    body {
      font-family: 'Vazirmatn', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
      text-align: right;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand { font-weight: 700; font-size: 1.25rem; color: var(--accent); }
    .nav-links { display: flex; gap: 1rem; list-style: none; }
    .nav-links a { color: var(--muted); font-size: 0.9rem; }
    .nav-links a:hover { color: var(--text); text-decoration: none; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    h1, h2, h3 { margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; }
    h2 { font-size: 1.35rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; color: var(--muted); }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.8rem;
      border-radius: 0.4rem;
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      direction: ltr;
      text-align: left;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    button, .btn {
      cursor: pointer;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 0.4rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .btn-primary { background: var(--accent); color: #0f172a; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); color: #0f172a; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: var(--muted); }
    .form-group { margin-bottom: 1rem; }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 0.4rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .alert-error { background: rgba(248,113,113,0.15); border: 1px solid var(--danger); color: var(--danger); }
    .alert-success { background: rgba(74,222,128,0.15); border: 1px solid var(--success); color: var(--success); }
    .alert-info { background: rgba(56,189,248,0.15); border: 1px solid var(--accent); color: var(--accent); }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-pending { background: rgba(251,191,36,0.2); color: var(--warning); }
    .badge-running { background: rgba(56,189,248,0.2); color: var(--accent); }
    .badge-completed { background: rgba(74,222,128,0.2); color: var(--success); }
    .badge-failed { background: rgba(248,113,113,0.2); color: var(--danger); }
    .badge-cancelled { background: rgba(148,163,184,0.2); color: var(--muted); }
    progress {
      width: 100%;
      height: 0.6rem;
      border-radius: 9999px;
      -webkit-appearance: none;
      appearance: none;
      margin: 0.5rem 0 1rem;
    }
    progress::-webkit-progress-bar { background: var(--border); border-radius: 9999px; }
    progress::-webkit-progress-value { background: var(--accent); border-radius: 9999px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: right; padding: 0.6rem 0.8rem; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .num { direction: ltr; text-align: left; }
    .platform-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
    .platform-chip {
      background: var(--border);
      border-radius: 0.4rem;
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .pagination a, .pagination span {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 0.3rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .pagination a:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .pagination .current { border-color: var(--accent); color: var(--accent); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="nav-brand">🎵 RubeTunes</span>
    <ul class="nav-links">
      <li><a href="/">دانلود جدید</a></li>
      <li><a href="/library">کتابخانه</a></li>
      <li><a href="/settings">تنظیمات</a></li>
      <li id="nav-logout-item" style="display:none"><a href="#" id="nav-logout">خروج</a></li>
      <li id="nav-login-item"><a href="/login">ورود</a></li>
    </ul>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    // Minimal auth state: check localStorage for access_token
    (function () {
      var token = sessionStorage.getItem('rt_access_token');
      if (token) {
        document.getElementById('nav-logout-item').style.display = '';
        document.getElementById('nav-login-item').style.display = 'none';
      }
      document.getElementById('nav-logout').addEventListener('click', function (e) {
        e.preventDefault();
        var t = sessionStorage.getItem('rt_access_token');
        if (t) {
          fetch('/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + t } });
        }
        sessionStorage.removeItem('rt_access_token');
        window.location.href = '/login';
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
