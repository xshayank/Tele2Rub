{% extends "base.html" %}
{% block title %}کتابخانه — RubeTunes{% endblock %}
{% block content %}
<div class="flex-between" style="margin-bottom:1.25rem">
  <h1 class="page-title" style="margin:0">📚 کتابخانه</h1>
  <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap">
    <select id="filter-status" style="width:auto; margin:0; font-size:0.88rem; padding:0.4rem 0.65rem; min-height:38px">
      <option value="">همه وضعیت‌ها</option>
      <option value="completed">✅ تکمیل شده</option>
      <option value="running">⏳ در حال اجرا</option>
      <option value="failed">❌ خطا</option>
      <option value="pending">🕐 در انتظار</option>
      <option value="cancelled">🚫 لغو شده</option>
      <option value="deleted">🗑 حذف شده</option>
    </select>
    <a href="/" class="btn btn-primary btn-sm">+ دانلود جدید</a>
  </div>
</div>

<div class="card" style="padding:0; overflow:hidden">
  <div class="table-scroll" id="jobs-container">
    <div style="padding:2.5rem; text-align:center; color:var(--muted)">
      <div style="font-size:2rem; margin-bottom:0.5rem">⏳</div>
      در حال بارگذاری...
    </div>
  </div>
  <div id="pagination" class="pagination" style="padding:1rem"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function() {
  var token = window.getToken();
  if (!token) { window.location.href = '/login'; return; }

  var currentPage = 1;
  var perPage = 20;
  var filterStatus = '';

  var statusLabels = {
    'pending': 'در انتظار', 'accepted': 'پذیرفته شد',
    'running': 'در حال اجرا', 'completed': 'تکمیل شد',
    'failed': 'خطا', 'cancelled': 'لغو شد', 'deleted': 'حذف شده'
  };
  var badgeClass = {
    'pending': 'badge-pending', 'accepted': 'badge-pending',
    'running': 'badge-running', 'completed': 'badge-completed',
    'failed': 'badge-failed', 'cancelled': 'badge-cancelled',
    'deleted': 'badge-cancelled'
  };
  var platformIcons = {
    'spotify': '🎵', 'youtube': '▶️', 'tidal': '🌊',
    'qobuz': '🎼', 'amazon': '🛒', 'soundcloud': '☁️',
    'bandcamp': '🏕️', 'instagram': '📸', 'musicdl': '🔍'
  };

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('fa-IR', { year: 'numeric', month: 'short', day: 'numeric' });
  }
  function formatBytes(bytes) {
    if (!bytes) return '';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(2) + ' GB';
  }
  function totalSize(keys) {
    if (!keys || !keys.length) return '';
    var total = keys.reduce(function(s, k) { return s + (k.size || 0); }, 0);
    return formatBytes(total);
  }
  function shortUrl(url) {
    try { var u = new URL(url); return u.hostname + u.pathname.substring(0, 28) + (u.pathname.length > 28 ? '…' : ''); }
    catch (_) { return url.substring(0, 40); }
  }

  function loadJobs() {
    var url = '/jobs?page=' + currentPage + '&per_page=' + perPage;
    window.authFetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data) return;
        var jobs = data.jobs || [];
        if (filterStatus) jobs = jobs.filter(function(j) { return j.status === filterStatus; });
        renderJobs(jobs, data.total, data.page, data.per_page);
      });
  }

  function renderJobs(jobs, total, page, perPage) {
    var container = document.getElementById('jobs-container');
    if (jobs.length === 0) {
      container.innerHTML = '<div style="padding:3rem; text-align:center; color:var(--muted)"><div style="font-size:2rem;margin-bottom:0.5rem">📭</div>هیچ کاری یافت نشد.</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    var html = '<table><thead><tr>'
      + '<th>پلتفرم</th><th>لینک</th><th>وضعیت</th>'
      + '<th class="hide-mobile">تاریخ</th><th class="hide-mobile">حجم</th><th>عملیات</th>'
      + '</tr></thead><tbody>';
    jobs.forEach(function(j) {
      var icon = platformIcons[j.platform] || '🎵';
      var badge = '<span class="badge ' + (badgeClass[j.status] || '') + '">' + (statusLabels[j.status] || j.status) + '</span>';
      var size = totalSize(j.s2_keys);
      var actions = '<a href="/ui/jobs/' + j.job_id + '" class="btn btn-secondary btn-sm">مشاهده</a>';
      if (j.status === 'completed') {
        actions += ' <button class="btn btn-primary btn-sm js-library-download" data-job-id="' + window.escHtml(j.job_id) + '">⬇ دانلود</button>';
      }
      html += '<tr>';
      html += '<td><span style="font-size:1.1rem">' + icon + '</span> <span class="hide-mobile">' + j.platform + '</span></td>';
      html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + window.escHtml(j.url) + '" class="num">' + window.escHtml(shortUrl(j.url)) + '</td>';
      html += '<td>' + badge + '</td>';
      html += '<td class="num hide-mobile">' + formatDate(j.created_at) + '</td>';
      html += '<td class="num hide-mobile">' + (size || '—') + '</td>';
      html += '<td style="white-space:nowrap">' + actions + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
    // Pagination
    var totalPages = Math.ceil(total / perPage);
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    var phtml = '';
    if (page > 1) phtml += '<a href="#" data-page="' + (page-1) + '">‹ قبلی</a>';
    for (var i = 1; i <= totalPages; i++) {
      if (i === page) phtml += '<span class="current">' + i + '</span>';
      else phtml += '<a href="#" data-page="' + i + '">' + i + '</a>';
    }
    if (page < totalPages) phtml += '<a href="#" data-page="' + (page+1) + '">بعدی ›</a>';
    document.getElementById('pagination').innerHTML = phtml;
    document.getElementById('pagination').querySelectorAll('a[data-page]').forEach(function(a) {
      a.addEventListener('click', function(e) { e.preventDefault(); currentPage = parseInt(this.dataset.page); loadJobs(); });
    });
  }

  document.getElementById('filter-status').addEventListener('change', function() {
    filterStatus = this.value;
    currentPage = 1;
    loadJobs();
  });

  async function doDownload(jobId) {
    var r = await window.authFetch('/jobs/' + jobId + '/download?part=0&url=1');
    if (!r) return;
    if (r.ok) {
      try {
        var data = await r.json();
        if (data.url) window.open(data.url, '_blank');
      } catch (_) {}
    }
  }

  document.getElementById('jobs-container').addEventListener('click', function(e) {
    var btn = e.target.closest('.js-library-download');
    if (!btn) return;
    doDownload(btn.dataset.jobId);
  });

  loadJobs();
})();
</script>
{% endblock %}
