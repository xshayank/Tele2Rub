{% extends "base.html" %}
{% block title %}ثبت‌نام — RubeTunes{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
  <div style="text-align:center; margin-bottom:1.5rem;">
    <div style="font-size:2.5rem; margin-bottom:0.5rem;">🎵</div>
    <div style="font-size:1.4rem; font-weight:800; color:var(--accent);">RubeTunes</div>
    <div style="font-size:0.85rem; color:var(--muted); margin-top:0.25rem;">ایجاد حساب جدید</div>
  </div>
  <div class="card" style="box-shadow:var(--shadow-md);">
    <div id="msg"></div>
    <form id="register-form">
      <div class="form-group">
        <label for="display_name">نام نمایشی</label>
        <input type="text" id="display_name" name="display_name" placeholder="نام شما" required autocomplete="name" style="direction:rtl; text-align:right;" />
      </div>
      <div class="form-group">
        <label for="email">ایمیل</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">رمز عبور</label>
        <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary" id="register-btn" style="width:100%; margin-top:0.25rem;">ثبت‌نام</button>
    </form>
    <hr class="divider" />
    <p style="font-size:0.88rem; color:var(--muted); text-align:center;">
      حساب دارید؟ <a href="/login">ورود کنید</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var msg = document.getElementById('msg');
  var btn = document.getElementById('register-btn');
  msg.innerHTML = '';
  btn.disabled = true;
  btn.textContent = 'در حال ثبت‌نام...';
  var body = {
    display_name: document.getElementById('display_name').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  };
  var resp = await fetch('/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  if (resp.ok) {
    window.location.href = '/pending';
  } else {
    var err = await resp.json();
    msg.innerHTML = '<div class="alert alert-error">' + (err.detail || 'خطا در ثبت‌نام') + '</div>';
    btn.disabled = false;
    btn.textContent = 'ثبت‌نام';
  }
});
</script>
{% endblock %}
