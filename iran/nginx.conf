# iran/nginx.conf — Nginx reverse proxy for the Iran VPS service (Track B, Step 11).
#
# Mount as:  ./iran/nginx.conf:/etc/nginx/conf.d/default.conf:ro
# Certificates must be placed in:  ./iran/certs/fullchain.pem
#                                   ./iran/certs/privkey.pem
#
# SSE (Server-Sent Events) support: proxy_buffering and proxy_cache are
# disabled so the browser receives job-progress events in real time.

server {
    listen 80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name iran.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    client_max_body_size 2m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Proxy all requests to the FastAPI application
    location / {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable response buffering so events stream immediately
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 3600s;

        # WebSocket upgrade support (used by /jobs/{id}/events WS path)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
