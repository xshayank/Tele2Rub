# alembic.ini — Alembic configuration for the Iran VPS service (Track B).
# This file lives at iran/db/alembic.ini and is referenced by running
# `alembic -c iran/db/alembic.ini <command>` from the repo root.

[alembic]
# Path to the migration scripts directory (relative to this file)
script_location = migrations

# Template for revision file names
file_template = %%(rev)s_%%(slug)s

# Timezone used for "Generating ..." messages
timezone = UTC

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
